#Energy Plugin
PluginEnergy=energy_rapl
PluginPowerModel=default

# --- EAR DB ---
MariaDBIp=mysql
MariaDBHost=mysql
MariaDBPort=3306
MariaDBDatabase=EAR_DB
MariaDBUser=ear_db
MariaDBPassw=earpass
MariaDBCommandsUser=ear_commands
MariaDBCommandsPassw=earpass
ReportNodeDetail=1 # Extended node information reported to database (added: temperature and avg_freq in power monitoring).
ReportSigDetail=1 # Extended signature hardware counters reported to database.
ReportLoops=0

# --- Global Manager (EARGM) ---
GlobalManagerVerbose=1
GlobalManagerHost=eargm
GlobalManagerPort=50000
GlobalManagerUseAggregated=1
GlobalManagerMode=0
GlobalManagerPeriodT1=240
GlobalManagerPeriodT2=480
GlobalManagerUnits=K
GlobalManagerEnergyLimit=550000
GlobalManagerPolicy=MaxEnergy
GlobalManagerMail=nomail
GlobalManagerWarningsPerc=85,90,95
GlobalManagerGracePeriods=3
GlobalManagerUseLog=1

# --- Node Daemon (EARD) ---
NodeDaemonVerbose=4
NodeDaemonPowermonFreq=60
NodeDaemonMaxPstate=1
NodeDaemonTurbo=0
NodeDaemonPort=5000
NodeUseDB=1
NodeUseEARDBD=1
NodeForceFrequencies=1
NodeUseLog=1
MinTimePerformanceAccuracy=10000000 # Minimum time between two energy readings for performance accuracy

# --- EARDBD ---
DBDaemonAggregationTime=180 # In seconds, interval of time of accumulating data to generate an energy aggregation
DBDaemonInsertionTime=60 # In seconds, time between inserts of the buffered data
DBDaemonPortTCP=4711
DBDaemonPortSecTCP=4712
DBDaemonSyncPort=4713
DBDaemonMemorySize=120
DBDaemonMemorySizePerType=40,20,5,24,5,1,5 # The percentage of the memory buffer used by the previous field, by each type. These types are: mpi, non-mpi and learning applications, loops, energy metrics and aggregations and events, in that order. If a type gets 0% of space, this metric is discarded and not saved into the database.
DBDaemonUseLog=1

# --- EARL library policy defaults ---
CoefficientsDir=/etc/ear/coeffs
DynAISLevels=4
DynAISWindowSize=500
DynaisTimeout=30 # DynaisTimeout seconds, if no signature is computed, EAR will go to periodic mode
LibraryPeriod=30 # When EAR goes to periodic mode, it will compute the Application signature every "LibraryPeriod" seconds
CheckEARModeEvery=1000 # EAR will check every N mpi calls whether it must go to periodic mode or not

TmpDir=/var/ear
EtcDir=/etc/ear
InstDir=/usr
DataBasePathName=/etc/ear/dbs/dbs.

# --- Authorizations ---
#AuthorizedUsers=
#AuthorizedAccounts=
#AuthorizedGroups=

# --- Power policies ---
DefaultPowerPolicy=monitoring
Policy=monitoring Settings=0 DefaultFreq=2.3 Privileged=0
Policy=min_time Settings=0.7 DefaultFreq=2.0 Privileged=0
Policy=min_energy Settings=0.1 DefaultFreq=2.3 Privileged=1
#Policy=monitoring Settings=0 DefaultPstate=0 Privileged=0
#Policy=min_time Settings=0.7 DefaultPstate=1 Privileged=0
#Policy=min_energy Settings=0.1 DefaultPstate=0 Privileged=1

# --- Islands ---
Island=0 Nodes=c[1-2] DBIP=eardbd DBSECIP=eardbd min_power=0 max_power=800 error_power=1000 max_temp=120

# Example special-node override (optional)
# NodeName=c1 CPUs=4 DefaultPstates=2,5,5